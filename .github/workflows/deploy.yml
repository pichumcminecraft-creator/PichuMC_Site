name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        env:
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'xxtlzmgjivvclbpmcjbg' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4dGx6bWdqaXZ2Y2xicG1jamJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTU2NDAsImV4cCI6MjA5MTQ3MTY0MH0.d7zhYxjE4DZkk1Ybon4EK6ZBRqbutLTmMncHzWvqTyQ' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://xxtlzmgjivvclbpmcjbg.supabase.co' }}
          # If deploying to https://<user>.github.io/<repo>/ (no custom domain),
          # set VITE_BASE_PATH repo secret to "/<repo>/" — including leading & trailing slash.
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH || '/' }}
        run: bun run build

      - name: Copy CNAME
        run: |
          if [ -f CNAME ]; then cp CNAME dist/CNAME; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
